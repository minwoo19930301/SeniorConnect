<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Planned home screen for An Agent for Elders</title>
  <desc id="desc">A concept image with four large buttons named Talk, See, Family, and Help. It is clearly labeled as a plan, not a working app.</desc>

  <rect width="1600" height="900" fill="#fdfae7"/>
  <path d="M0 0h720L570 900H0z" fill="#1e2bfa" opacity="0.055"/>
  <g fill="#1e2bfa" opacity="0.22">
    <circle cx="690" cy="76" r="5"/><circle cx="716" cy="76" r="5"/><circle cx="742" cy="76" r="5"/>
    <circle cx="690" cy="102" r="5"/><circle cx="716" cy="102" r="5"/><circle cx="742" cy="102" r="5"/>
    <circle cx="690" cy="128" r="5"/><circle cx="716" cy="128" r="5"/><circle cx="742" cy="128" r="5"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="82" y="72" width="338" height="44" rx="22" fill="#1e2bfa" opacity="0.09"/>
    <text x="251" y="101" text-anchor="middle" fill="#1e2bfa" font-size="18" font-weight="700" letter-spacing="1.2">PLANNED UI · CONCEPT ONLY</text>

    <text x="82" y="208" fill="#111111" font-size="67" font-weight="700">
      <tspan x="82" dy="0">Four large choices.</tspan>
      <tspan x="82" dy="78">One clear next step.</tspan>
    </text>

    <text x="82" y="392" fill="#525252" font-size="28">
      <tspan x="82" dy="0">A simple home screen for older adults.</tspan>
      <tspan x="82" dy="42">The person stays in control.</tspan>
    </text>

    <g transform="translate(82 506)">
      <circle cx="20" cy="20" r="20" fill="#1e2bfa"/>
      <path d="M10 20l7 7 14-16" fill="none" stroke="#fdfae7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#111111" font-size="25" font-weight="600">Asks before calling or messaging</text>
    </g>
    <g transform="translate(82 584)">
      <circle cx="20" cy="20" r="20" fill="#1e2bfa"/>
      <path d="M10 20l7 7 14-16" fill="none" stroke="#fdfae7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#111111" font-size="25" font-weight="600">Opens the camera only when asked</text>
    </g>
    <g transform="translate(82 662)">
      <circle cx="20" cy="20" r="20" fill="#1e2bfa"/>
      <path d="M10 20l7 7 14-16" fill="none" stroke="#fdfae7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="29" fill="#111111" font-size="25" font-weight="600">Always keeps Home and Stop close</text>
    </g>

    <text x="82" y="820" fill="#6b6b6b" font-size="20">This repository contains plans and checks. The Android app is not built yet.</text>
  </g>

  <g transform="translate(850 44)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="662" height="812" rx="52" fill="#1e2bfa" opacity="0.13"/>
    <rect x="18" y="18" width="626" height="776" rx="40" fill="#fffdf2" stroke="#1e2bfa" stroke-width="3"/>
    <rect x="246" y="34" width="152" height="12" rx="6" fill="#111111" opacity="0.16"/>

    <text x="62" y="92" fill="#1e2bfa" font-size="18" font-weight="700" letter-spacing="1">AN AGENT FOR ELDERS</text>
    <rect x="445" y="64" width="142" height="42" rx="21" fill="#1e2bfa" opacity="0.08"/>
    <circle cx="470" cy="85" r="8" fill="#059669"/>
    <text x="489" y="92" fill="#111111" font-size="17" font-weight="600">Mina ready</text>

    <text x="62" y="164" fill="#111111" font-size="38" font-weight="700">What would you like to do?</text>
    <text x="62" y="201" fill="#6b6b6b" font-size="22">Tap one large button, or say it aloud.</text>

    <g transform="translate(54 238)">
      <rect width="250" height="174" rx="22" fill="#1e2bfa" opacity="0.075" stroke="#1e2bfa" stroke-width="2"/>
      <path d="M42 42h58a15 15 0 0 1 15 15v32a15 15 0 0 1-15 15H70l-20 17v-17h-8a15 15 0 0 1-15-15V57a15 15 0 0 1 15-15z" fill="none" stroke="#1e2bfa" stroke-width="6" stroke-linejoin="round"/>
      <text x="32" y="151" fill="#111111" font-size="31" font-weight="700">Talk</text>
    </g>
    <g transform="translate(322 238)">
      <rect width="250" height="174" rx="22" fill="#1e2bfa" opacity="0.075" stroke="#1e2bfa" stroke-width="2"/>
      <path d="M38 58h24l9-14h35l9 14h18a13 13 0 0 1 13 13v41a13 13 0 0 1-13 13H38a13 13 0 0 1-13-13V71a13 13 0 0 1 13-13z" fill="none" stroke="#1e2bfa" stroke-width="6" stroke-linejoin="round"/>
      <circle cx="85" cy="91" r="22" fill="none" stroke="#1e2bfa" stroke-width="6"/>
      <text x="32" y="151" fill="#111111" font-size="31" font-weight="700">See</text>
    </g>
    <g transform="translate(54 430)">
      <rect width="250" height="174" rx="22" fill="#1e2bfa" opacity="0.075" stroke="#1e2bfa" stroke-width="2"/>
      <circle cx="72" cy="72" r="26" fill="none" stroke="#1e2bfa" stroke-width="6"/>
      <path d="M28 124c7-22 22-34 44-34s37 12 44 34M123 53c19 5 30 18 33 38M129 93l21 18 19-23" fill="none" stroke="#1e2bfa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="151" fill="#111111" font-size="31" font-weight="700">Family</text>
    </g>
    <g transform="translate(322 430)">
      <rect width="250" height="174" rx="22" fill="#1e2bfa" opacity="0.075" stroke="#1e2bfa" stroke-width="2"/>
      <circle cx="83" cy="79" r="46" fill="none" stroke="#1e2bfa" stroke-width="6"/>
      <path d="M71 66c2-13 10-20 23-20 14 0 23 8 23 20 0 10-5 16-15 22-7 4-10 8-10 16M92 119v2" fill="none" stroke="#1e2bfa" stroke-width="7" stroke-linecap="round"/>
      <text x="32" y="151" fill="#111111" font-size="31" font-weight="700">Help</text>
    </g>

    <line x1="54" y1="632" x2="572" y2="632" stroke="#1e2bfa" stroke-width="2" opacity="0.16"/>
    <rect x="54" y="660" width="188" height="68" rx="34" fill="#1e2bfa" opacity="0.08"/>
    <path d="M82 695a17 17 0 1 1 5 12M82 695v-15M82 695h15" fill="none" stroke="#1e2bfa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="113" y="704" fill="#111111" font-size="19" font-weight="700">Repeat Slowly</text>

    <rect x="258" y="660" width="166" height="68" rx="34" fill="#1e2bfa"/>
    <path d="M291 699v-20l16-13 16 13v20h-12v-14h-9v14z" fill="none" stroke="#fdfae7" stroke-width="4" stroke-linejoin="round"/>
    <text x="333" y="704" fill="#fdfae7" font-size="19" font-weight="700">Home</text>

    <rect x="440" y="660" width="132" height="68" rx="34" fill="#fffdf2" stroke="#b42318" stroke-width="3"/>
    <rect x="465" y="682" width="25" height="25" rx="4" fill="#b42318"/>
    <text x="507" y="704" fill="#8f1d14" font-size="19" font-weight="700">Stop</text>

    <text x="313" y="768" text-anchor="middle" fill="#6b6b6b" font-size="16">Concept screen · no working app yet</text>
  </g>
</svg>
