org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.nonTransitiveRClass=true
org.gradle.java.installations.auto-download=false

# Explicitly tell Gradle toolchain detection where to find JDKs.
# This prevents it from picking up Kiro's stripped JRE 21 (which lacks jlink).
org.gradle.java.installations.paths=C:\\Program Files\\Android\\Android Studio\\jbr,C:\\Program Files\\Java\\jdk-24

# Also set the daemon JVM directly to Android Studio's JBR
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr
