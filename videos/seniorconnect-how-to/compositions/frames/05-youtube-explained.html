      <script>
        (() => {
          const compositionId = "05-youtube-explained";
          window.__timelines = window.__timelines || {};

          const player = document.querySelector(".f05-player");
          const adWorld = document.querySelector(".f05-ad-world");
          const installWorld = document.querySelector(".f05-install-world");
          const adLine = document.getElementById("f05-ad-line");
          const waitLine = document.getElementById("f05-wait-line");
          const countdownEl = document.getElementById("f05-countdown");
          const warningChunks = [
            document.getElementById("f05-warning-1"),
            document.getElementById("f05-warning-2"),
            document.getElementById("f05-warning-3"),
          ];
          const cancelMarker = document.getElementById("f05-cancel-marker");
          const youChoose = document.getElementById("f05-you-choose");
          const blurNode = document.getElementById("f05-ad-streak-blur");

          const BEATS = [0.06, 1.8, 2.34, 3.6, 5.2, 6.36, 6.78];
          const timeline = gsap.timeline({ paused: true });

          gsap.set(adLine, { x: 520, opacity: 0 });
          gsap.set(waitLine, { opacity: 0 });
          gsap.set(installWorld, { y: 230, opacity: 0 });
          gsap.set(warningChunks, { opacity: 0 });
          gsap.set(cancelMarker, { scale: 0.72, rotation: -5, opacity: 0 });
          gsap.set(youChoose, { y: 18, opacity: 0 });

          const COUNTDOWN = [
            { t: 0, text: "Ad · 5 seconds" },
            { t: 0.58, text: "Ad · 4 seconds" },
            { t: 1.16, text: "Ad · 3 seconds" },
          ];

          const countdownAt = (time) => {
            for (let index = COUNTDOWN.length - 1; index >= 0; index -= 1) {
              if (time >= COUNTDOWN[index].t) return COUNTDOWN[index].text;
            }
            return COUNTDOWN[0].text;
          };

          const countdownDriver = { t: 0 };
          timeline.to(
            countdownDriver,
            {
              t: 1.8,
              duration: 1.8,
              ease: "none",
              onUpdate: () => {
                const nextText = countdownAt(countdownDriver.t);
                if (countdownEl.textContent !== nextText) countdownEl.textContent = nextText;
              },
            },
            0,
          );

          timeline.fromTo(
            player,
            { y: 82, scale: 0.965, opacity: 0 },
            { y: 0, scale: 1, opacity: 1, duration: 0.4, ease: "power4.out" },
            BEATS[0],
          );

          timeline.to(player, { opacity: 0.2, duration: 0.24, ease: "power2.out" }, BEATS[1]);

          const blurProxy = { v: 14 };
          const writeBlur = () => blurNode.setAttribute("stdDeviation", `${blurProxy.v} 0`);
          writeBlur();

          timeline.fromTo(
            adLine,
            { x: 520, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.48, ease: "power4.out" },
            BEATS[1],
          );
          timeline.to(
            blurProxy,
            { v: 0, duration: 0.48, ease: "power4.out", onUpdate: writeBlur },
            BEATS[1],
          );

          timeline.set(waitLine, { opacity: 1 }, BEATS[2]);

          timeline.to(adWorld, { y: -230, duration: 0.34, ease: "power4.in" }, BEATS[3]);
          timeline.to(adWorld, { opacity: 0, duration: 0.3, ease: "power1.in" }, BEATS[3]);
          timeline.set(adWorld, { opacity: 0 }, BEATS[3] + 0.32);
          timeline.fromTo(
            installWorld,
            { y: 230, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.34, ease: "power4.out" },
            BEATS[3] + 0.32,
          );

          const CHUNK_CONTENT = ["THIS MAY", "INSTALL", "A GAME"];
          const BASE_DURATION = 0.26;
          const SECONDS_PER_CHARACTER = 0.018;
          let cumulative = BEATS[4];
          const CHUNK_SCHEDULE = CHUNK_CONTENT.map((text) => {
            const start = cumulative;
            cumulative += BASE_DURATION + text.length * SECONDS_PER_CHARACTER;
            return { text, start };
          });

          timeline.fromTo(
            warningChunks[0],
            { x: -120, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.38, ease: "expo.out" },
            CHUNK_SCHEDULE[0].start,
          );
          timeline.fromTo(
            warningChunks[1],
            { scale: 1.22, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.42, ease: "power4.out" },
            CHUNK_SCHEDULE[1].start,
          );
          timeline.fromTo(
            warningChunks[2],
            { y: 55, rotation: 2, opacity: 0 },
            { y: 0, rotation: 0, opacity: 1, duration: 0.42, ease: "circ.out" },
            CHUNK_SCHEDULE[2].start,
          );

          timeline.fromTo(
            cancelMarker,
            { scale: 0.72, rotation: -5, opacity: 0 },
            {
              scale: 1,
              rotation: -3,
              opacity: 1,
              duration: 0.5,
              ease: "back.out(1.7)",
            },
            BEATS[5],
          );

          timeline.fromTo(
            youChoose,
            { y: 18, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.34, ease: "power4.out" },
            BEATS[6],
          );

          window.__timelines[compositionId] = timeline;
        })();
      </script>
