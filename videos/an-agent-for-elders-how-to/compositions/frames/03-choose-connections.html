      var camera = root.querySelector("#f03-camera");
      var header = root.querySelector("#f03-header");
      var personStep = root.querySelector("#f03-person-step");
      var personCard = root.querySelector("#f03-person-card");
      var personOutline = root.querySelector("#f03-person-outline");
      var appsStep = root.querySelector("#f03-apps-step");
      var cards = Array.prototype.slice.call(root.querySelectorAll(".destination-card"));
      var checks = Array.prototype.slice.call(root.querySelectorAll(".checkmark"));
      var connectionPaths = Array.prototype.slice.call(root.querySelectorAll(".connection-path"));
      var ghostApps = Array.prototype.slice.call(root.querySelectorAll(".ghost-app"));
      var guardrailPills = Array.prototype.slice.call(root.querySelectorAll(".guardrail-pill"));
      var finalWords = [
        root.querySelector("#f03-word-nothing"),
        root.querySelector("#f03-word-connects"),
        root.querySelector("#f03-word-silently")
      ];
      var finalRule = root.querySelector("#f03-final-rule");

      function preparePath(path) {
        var length = path.getTotalLength();
        path.style.strokeDasharray = String(length);
        path.style.strokeDashoffset = String(length);
      }

      preparePath(personOutline);
      connectionPaths.forEach(preparePath);
      checks.forEach(function (svg) {
        preparePath(svg.querySelector(".check-ring"));
        preparePath(svg.querySelector(".check-path"));
      });

      /* Scene 1 — compressed from 0–1.5s to 0–1.079s. */
      tl.fromTo(
        header,
        { opacity: 0, y: -14 },
        { opacity: 1, y: 0, duration: 0.34, ease: "power2.out" },
        0.02
      );
      tl.fromTo(
        personStep,
        { opacity: 0, x: -20 },
        { opacity: 1, x: 0, duration: 0.34, ease: "power2.out" },
        0.08
      );
      tl.fromTo(
        personCard,
        { opacity: 0, y: 44, scale: 0.985 },
        { opacity: 1, y: 0, scale: 1, duration: 0.46, ease: "power3.out" },
        0.08
      );
      tl.to(
        personOutline,
        { strokeDashoffset: 0, duration: 0.58, ease: "power2.out" },
        0.18
      );

      /* Scene 2 — compressed from 1.5–3.8s to 1.079–2.733s. */
      tl.fromTo(
        appsStep,
        { opacity: 0, x: -20 },
        { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" },
        1.04
      );

      var cardStarts = [1.10, 1.37, 1.64, 1.91, 2.18];
      var cardOffsets = [
        { x: -24, y: 28 },
        { x: 24, y: 28 },
        { x: -20, y: 24 },
        { x: 20, y: 24 },
        { x: 0, y: 30 }
      ];

      cards.forEach(function (card, index) {
        tl.fromTo(
          card,
          {
            opacity: 0,
            x: cardOffsets[index].x,
            y: cardOffsets[index].y,
            scale: 0.95
          },
          { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.34, ease: "power3.out" },
          cardStarts[index]
        );

        var ring = checks[index].querySelector(".check-ring");
        var mark = checks[index].querySelector(".check-path");
        tl.to(
          ring,
          { strokeDashoffset: 0, duration: 0.22, ease: "power2.out" },
          cardStarts[index] + 0.13
        );
        tl.to(
          mark,
          { strokeDashoffset: 0, duration: 0.22, ease: "power2.out" },
          cardStarts[index] + 0.2
        );
      });

      /* Scene 3 — compressed from 3.8–5.4s to 2.733–3.884s. */
      connectionPaths.forEach(function (path, index) {
        tl.to(
          path,
          { strokeDashoffset: 0, duration: 0.42, ease: "power2.out" },
          2.733 + index * 0.075
        );
      });

      tl.fromTo(
        camera,
        { scale: 1.035, y: 12 },
        { scale: 0.985, y: 0, duration: 0.72, ease: "power2.inOut" },
        2.733
      );

      ghostApps.forEach(function (ghost, index) {
        var positionOpacity = [0.035, 0.055, 0.045, 0.03][index];
        tl.to(
          ghost,
          { opacity: positionOpacity, duration: 0.52, ease: "power2.out" },
          2.78 + index * 0.035
        );
      });

      guardrailPills.forEach(function (pill, index) {
        tl.fromTo(
          pill,
          { opacity: 0, y: 18, scale: 0.97 },
          { opacity: 1, y: 0, scale: 1, duration: 0.36, ease: "power3.out" },
          3.16 + index * 0.16
        );
      });

      /* Scene 4 — compressed from 5.4–7.0s to 3.884–5.035s. */
      tl.fromTo(
        finalWords[0],
        { opacity: 0, scale: 1.42 },
        { opacity: 1, scale: 1, duration: 0.34, ease: "power4.out" },
        3.884
      );
      tl.fromTo(
        finalWords[1],
        { opacity: 0, x: -140 },
        { opacity: 1, x: 0, duration: 0.34, ease: "expo.out" },
        4.0
      );
      tl.fromTo(
        finalWords[2],
        { opacity: 0, y: 46, rotation: 2.5 },
        { opacity: 1, y: 0, rotation: 0, duration: 0.38, ease: "circ.out" },
        4.14
      );
      tl.fromTo(
        finalRule,
        { opacity: 0, scaleX: 0 },
        { opacity: 1, scaleX: 1, duration: 0.4, ease: "power3.out" },
        4.3
      );

      window.__timelines[compositionId] = tl;
    })();
  </script>
</template>
