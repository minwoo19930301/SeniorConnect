      <div data-hf-id="hf-8bmh" id="root" data-composition-id="02-simple-home-screen" data-width="1080" data-height="1920" data-duration="5.449">
        <div data-hf-id="hf-lmb3" class="f02s-ground clip" data-start="0" data-duration="5.449" data-track-index="0"></div>

        <div data-hf-id="hf-m6ct" class="f02s-scene clip" data-start="0" data-duration="5.449" data-track-index="1">
          <svg data-hf-id="hf-j2ct" class="f02s-filter-defs" aria-hidden="true">
            <defs data-hf-id="hf-mh0t">
              <filter data-hf-id="hf-s2wv" id="f02s-motion-blur" x="-15%" y="-20%" width="130%" height="140%">
                <fegaussianblur data-hf-id="hf-ostb" id="f02s-motion-blur-node" in="SourceGraphic" stdDeviation="0 16" />
              </filter>
            </defs>
          </svg>

          <div data-hf-id="hf-yzw3" class="f02s-rail" aria-hidden="true">
            <span data-hf-id="hf-43og">Concept trailer</span>
            <span data-hf-id="hf-7aqj" class="f02s-rail-note">Built for clarity</span>
          </div>

          <div data-hf-id="hf-pdmk" id="f02s-headline" class="f02s-headline">
            One simple
            <span data-hf-id="hf-2z2z" class="f02s-headline-accent">home screen</span>
          </div>

          <div data-hf-id="hf-mhlu" id="f02s-concept-label" class="f02s-concept-label">Concept screen</div>

          <div data-hf-id="hf-berc" id="f02s-hero-shell" class="f02s-hero-shell">
            <img data-hf-id="hf-fvns" id="f02s-home-image" class="f02s-home-image" src="assets/ui/planned-home-screen.png" alt="Planned home screen with Call, YouTube, Speak, and Camera">
          </div>

          <div data-hf-id="hf-9p5b" id="f02s-callout-call" class="f02s-callout f02s-callout-left f02s-callout-top">
            <span data-hf-id="hf-45nq" class="f02s-callout-tag">Call</span>

            <span data-hf-id="hf-nagx" class="f02s-callout-tag">Camera</span>

      </div>

      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        window.__timelines["02-simple-home-screen"] = tl;

        const homeImage = document.getElementById("f02s-home-image");
        const blurNode = document.getElementById("f02s-motion-blur-node");
        const blurState = { value: 16 };

        tl.fromTo(
          "#f02s-hero-shell",
          { y: 215, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.46, ease: "power4.out" },
          0.03,
        );

        tl.to(
          blurState,
          {
            value: 0,
            duration: 0.46,
            ease: "power4.out",
            onUpdate: () => {
              blurNode.setAttribute("stdDeviation", `0 ${blurState.value}`);
            },
          },
          0.03,
        );

        tl.fromTo(
          "#f02s-concept-label",
          { y: 22, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.38, ease: "power3.out" },
          0.18,
        );

        tl.fromTo(
          homeImage,
          {
            y: -34,
            scale: 1.045,
            clipPath: "inset(0 0 56% 0 round 24px)",
          },
          {
            y: -112,
            scale: 1,
            clipPath: "inset(0 0 0% 0 round 24px)",
            duration: 1.3,
            ease: "power2.inOut",
          },
          1.1,
        );

        const calloutSource = [
          { selector: "#f02s-callout-call", label: "CALL", side: -1 },
          { selector: "#f02s-callout-youtube", label: "YOUTUBE", side: 1 },
          { selector: "#f02s-callout-speak", label: "SPEAK", side: -1 },
          { selector: "#f02s-callout-camera", label: "CAMERA", side: 1 },
        ];
        let calloutCursor = 2.42;
        const calloutSchedule = calloutSource.map((item) => {
          const start = calloutCursor;
          const duration = 0.28 + item.label.length * 0.012;
          calloutCursor += 0.22;
          return { ...item, start, duration };
        });

        calloutSchedule.forEach((item) => {
          tl.fromTo(
            item.selector,
            { x: item.side * 34, y: 10, opacity: 0, scale: 0.94 },
            {
              x: 0,
              y: 0,
              opacity: 1,
              scale: 1,
              duration: item.duration,
              ease: "power3.out",
            },
            item.start,
          );

          tl.fromTo(
            `${item.selector} .f02s-callout-line`,
            { scaleX: 0, opacity: 0 },
            { scaleX: 1, opacity: 1, duration: 0.28, ease: "power3.out" },
            item.start + 0.08,
          );
        });

        tl.fromTo(
          "#f02s-headline",
          { y: 34, opacity: 0, scale: 0.97 },
          { y: 0, opacity: 1, scale: 1, duration: 0.52, ease: "power4.out" },
          3.78,
        );
      </script>
