      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const duration = 6.165;

        const typedTitle = document.getElementById("f02-typed-title");
        const cursor = document.getElementById("f02-type-cursor");
        const fullTitle = "An Agent for Elders";
        const typeDriver = { value: 0 };
        typedTitle.textContent = "";

        tl.fromTo(
          "#f02-listing",
          { opacity: 0, y: 36, scale: 0.985 },
          { opacity: 1, y: 0, scale: 1, duration: 0.46, ease: "power3.out" },
          0.08,
        );

        tl.to(
          typeDriver,
          {
            value: fullTitle.length,
            duration: 0.98,
            ease: "power1.inOut",
            onUpdate: () => {
              typedTitle.textContent = fullTitle.slice(0, Math.floor(typeDriver.value));
            },
          },
          0.22,
        );

        const cursorPhase = { value: 0 };
        tl.to(
          cursorPhase,
          {
            value: Math.PI * 6,
            duration: 1.32,
            ease: "none",
            onUpdate: () => {
              cursor.style.opacity = Math.sin(cursorPhase.value) >= 0 ? "1" : "0.18";
            },
          },
          0.08,
        );

        tl.fromTo(
          "#f02-progress-orbit",
          { rotation: -120, opacity: 0.25 },
          { rotation: 228, opacity: 1, duration: 0.84, ease: "power2.inOut" },
          0.2,
        );
        tl.fromTo(
          "#f02-publish-note",
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.38, ease: "power3.out" },
          0.68,
        );
        tl.to("#f02-download-arrow", { opacity: 0, scale: 0.75, duration: 0.16, ease: "power2.in" }, 1.04);
        tl.to("#f02-progress-orbit", { opacity: 0, duration: 0.16, ease: "none" }, 1.04);
        tl.fromTo(
          "#f02-check",
          { opacity: 0, scale: 0.55 },
          { opacity: 1, scale: 1, duration: 0.36, ease: "power4.out" },
          1.08,
        );

        tl.fromTo(
          "#f02-ticker-block",
          { opacity: 0, y: 48 },
          { opacity: 1, y: 0, duration: 0.42, ease: "power3.out" },
          1.34,
        );

        const tickerStack = document.getElementById("f02-ticker-stack");
        const itemHeight = 112;
        const tickerSprings = [{ p: 0 }, { p: 0 }];
        const applyTicker = () => {
          const total = tickerSprings.reduce((sum, spring) => sum + spring.p, 0);
          tickerStack.style.transform = `translate3d(0, ${-total * itemHeight}px, 0)`;
        };
        applyTicker();

        tickerSprings.forEach((spring, index) => {
          tl.to(
            spring,
            {
              p: 1,
              duration: 0.48,
              ease: "power4.out",
              onUpdate: applyTicker,
            },
            1.72 + index * 0.42,
          );
        });

        const victim = document.getElementById("f02-victim-shell");
        const heroMotion = document.getElementById("f02-hero-motion");
        const heroHold = document.getElementById("f02-hero-hold");
        const blurNode = document.getElementById("f02-hero-streak-blur");
        const impactDriver = { p: 0 };

        tl.set(heroMotion, { opacity: 0 }, 0);
        tl.to(
          impactDriver,
          {
            p: 1,
            duration: 1.04,
            ease: "power4.out",
            onUpdate: () => {
              const heroY = 600 * (1 - impactDriver.p);
              const heroOpacity = Math.min(1, impactDriver.p * 7);
              const victimP = Math.min(1, impactDriver.p / 0.46);
              const victimY = -1240 * victimP;
              const victimOpacity = 1 - victimP;
              const blur = 18 * (1 - impactDriver.p);

              heroMotion.style.transform = `translate3d(0, ${heroY}px, 0)`;
              heroMotion.style.opacity = String(heroOpacity);
              victim.style.transform = `translate3d(0, ${victimY}px, 0)`;
              victim.style.opacity = String(victimOpacity);
              blurNode.setAttribute("stdDeviation", `0 ${blur}`);
            },
          },
          2.8,
        );

        tl.fromTo(
          heroHold,
          { scale: 0.94, rotation: -4 },
          { scale: 1, rotation: 0, duration: 1.08, ease: "power2.out" },
          2.8,
        );

        const payoffEntries = [
          { selector: "#f02-payoff-one", text: "ONE" },
          { selector: "#f02-payoff-simple", text: "SIMPLE" },
          { selector: "#f02-payoff-front", text: "FRONT DOOR" },
        ];
        let payoffCursor = 4.18;
        const payoffTimeline = payoffEntries.map((entry) => {
          const revealDuration = 0.25 + entry.text.length * 0.018;
          const start = payoffCursor;
          payoffCursor += 0.17 + entry.text.length * 0.014;
          return { ...entry, start, revealDuration };
        });

        payoffTimeline.forEach((entry) => {
          tl.fromTo(
            entry.selector,
            { opacity: 0, y: 46, scale: 0.965 },
            {
              opacity: 1,
              y: 0,
              scale: 1,
              duration: entry.revealDuration,
              ease: "power4.out",
            },
            entry.start,
          );
        });

        tl.fromTo(
          "#f02-support-line",
          { opacity: 0, y: 22 },
          { opacity: 1, y: 0, duration: 0.46, ease: "power3.out" },
          5.02,
        );
        tl.fromTo(
          "#f02-payoff-rule",
          { opacity: 0, scaleX: 0 },
          { opacity: 1, scaleX: 1, duration: 0.58, ease: "power3.out" },
          5.16,
        );

        const jitter = { p: 0 };
        const jitterStart = 4.08;
        const jitterDuration = duration - jitterStart;
        tl.to(
          jitter,
          {
            p: Math.PI * 2 * 1.2,
            duration: jitterDuration,
            ease: "none",
            onUpdate: () => {
              const progress = jitter.p / (Math.PI * 2 * 1.2);
              const envelope = progress < 0.8 ? 1 : (1 - progress) / 0.2;
              const x = Math.sin(jitter.p * 2.15) * 1.2 * envelope;
              const y = Math.sin(jitter.p * 1.3) * 1.7 * envelope;
              const rotation = Math.sin(jitter.p * 2.7) * 0.22 * envelope;
              const scale = 1 + Math.sin(jitter.p) * 0.004 * envelope;
              heroHold.style.transform = `translate3d(${x}px, ${y}px, 0) rotate(${rotation}deg) scale(${scale})`;
            },
          },
          jitterStart,
        );

        window.__timelines["02-one-front-door"] = tl;
      </script>
    </template>
  </body>
</html>
