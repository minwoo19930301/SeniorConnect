      <script>
        window.__timelines = window.__timelines || {};

        const sixTimeline = gsap.timeline({ paused: true });

        // Scene 1: one shared tempo grid drives all four distinct title hits and the rule.
        const SIX_ACTION_BEATS = [0.04, 0.43, 0.82, 1.21];

        sixTimeline.fromTo(
          "#six-action-call",
          { scale: 1.5, filter: "blur(14px)", opacity: 0 },
          { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.32, ease: "power4.out" },
          SIX_ACTION_BEATS[0],
        );
        sixTimeline.fromTo(
          "#six-action-youtube",
          { x: -380, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.31, ease: "expo.out" },
          SIX_ACTION_BEATS[1],
        );
        sixTimeline.fromTo(
          "#six-action-speak",
          { y: 112, rotation: 5, opacity: 0 },
          { y: 0, rotation: 0, opacity: 1, duration: 0.34, ease: "circ.out" },
          SIX_ACTION_BEATS[2],
        );
        sixTimeline.fromTo(
          "#six-action-camera",
          { x: 380, rotation: -4, opacity: 0 },
          { x: 0, rotation: 0, opacity: 1, duration: 0.27, ease: "power3.out" },
          SIX_ACTION_BEATS[3],
        );

        sixTimeline.set("#six-action-call", { opacity: 0 }, SIX_ACTION_BEATS[1]);
        sixTimeline.set("#six-action-youtube", { opacity: 0 }, SIX_ACTION_BEATS[2]);
        sixTimeline.set("#six-action-speak", { opacity: 0 }, SIX_ACTION_BEATS[3]);
        sixTimeline.set(".six-action-word", { opacity: 0 }, 1.49);
        sixTimeline.set("#six-beat-stage", { autoAlpha: 0 }, 1.49);

        sixTimeline.fromTo(
          "#six-beat-rule-fill",
          { scaleX: 0 },
          { scaleX: 0.25, duration: 0.18, ease: "power3.out" },
          SIX_ACTION_BEATS[0],
        );
        SIX_ACTION_BEATS.slice(1).forEach((beat, index) => {
          sixTimeline.to(
            "#six-beat-rule-fill",
            { scaleX: (index + 2) / SIX_ACTION_BEATS.length, duration: 0.18, ease: "power3.out" },
            beat,
          );
        });

        // The four beats lock into one typographic object before the image swap.
        sixTimeline.fromTo(
          "#six-word-lockup",
          { scale: 0.92, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.2, ease: "power3.out" },
          1.5,
        );

        // Scene 2: the four-word lockup and the actual PNG share one footprint and overlap briefly.
        sixTimeline.to(
          "#six-word-lockup",
          { scale: 0.72, opacity: 0, duration: 0.36, ease: "power2.in" },
          1.7,
        );
        sixTimeline.fromTo(
          "#six-image-payoff",
          { scale: 0.72, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.62, ease: "back.out(1.4)" },
          1.92,
        );
        sixTimeline.set("#six-word-lockup", { autoAlpha: 0 }, 2.07);
        sixTimeline.to(
          "#six-beat-rule",
          { opacity: 0, duration: 0.24, ease: "power1.in" },
          1.7,
        );

        // Scene 3: content length precomputes each measured headline chunk onset.
        const SIX_TITLE_CONTENT = gsap.utils.toArray(".six-closing-chunk").map((node, index) => ({
          node,
          text: node.textContent.trim(),
          hold: index === 2 ? 0.14 : 0.08,
        }));
        let sixTitleCursor = 3.2;
        const SIX_TITLE_SCHEDULE = SIX_TITLE_CONTENT.map((entry) => {
          const duration = 0.14 + entry.text.length * 0.018 + entry.hold;
          const start = sixTitleCursor;
          sixTitleCursor += duration;
          return { ...entry, start, end: sixTitleCursor };
        });
        SIX_TITLE_SCHEDULE.forEach((entry) => {
          sixTimeline.fromTo(
            entry.node,
            { y: 28, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.38, ease: "power3.out" },
            entry.start,
          );
        });
        sixTimeline.fromTo(
          "#six-title-rule",
          { scaleX: 0, opacity: 0 },
          { scaleX: 1, opacity: 1, duration: 0.46, ease: "power3.out" },
          SIX_TITLE_SCHEDULE[2].start + 0.12,
        );

        // Scene 4: final concept-only copy arrives, then every element holds completely still.
        sixTimeline.fromTo(
          "#six-control-line",
          { y: 22, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.42, ease: "power3.out" },
          4.6,

        sixTimeline.fromTo(
