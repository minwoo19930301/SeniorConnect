              <div data-hf-id="hf-vfca" class="maze-phone-speaker"></div>

          <div data-hf-id="hf-ig68" class="maze-demand" id="maze-demand-1" data-from-x="-360" data-from-y="-210">Update now</div>
          <div data-hf-id="hf-ra8k" class="maze-demand" id="maze-demand-2" data-from-x="390" data-from-y="-170">New game?</div>
          <div data-hf-id="hf-y0tf" class="maze-demand" id="maze-demand-3" data-from-x="-420" data-from-y="10">Allow access?</div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const mazeTimeline = gsap.timeline({ paused: true });

        // Scene 1 — recognizable phone surfaces and a per-word title reveal.
        mazeTimeline.fromTo(
          "#maze-phone-wrap",
          { scale: 0.94, y: 42, opacity: 0 },
          { scale: 1, y: 0, opacity: 1, duration: 0.44, ease: "power3.out" },
          0.04,
        );

        gsap.utils.toArray(".maze-title-word").forEach((word, index) => {
          mazeTimeline.fromTo(
            word,
            { y: 72, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.38, ease: "power4.out" },
            0.04 + index * 0.11,
          );
        });

        mazeTimeline.fromTo(
          "#maze-accent-rule",
          { scaleX: 0, opacity: 0 },
          { scaleX: 1, opacity: 1, duration: 0.44, ease: "power3.out" },
          0.28,
        );

        gsap.utils.toArray(".maze-primary-card").forEach((card, index) => {
          mazeTimeline.fromTo(
            card,
            { scale: 0.9, y: 34, opacity: 0 },
            { scale: 1, y: 0, opacity: 1, duration: 0.42, ease: "power3.out" },
            0.36 + index * 0.14,
          );
        });

        // Scene 2 — app tiles radiate from the phone's center into short-path slots.
        const mazeChipOrigins = [
          [300, 170], [170, 192], [40, 156], [-90, 194], [-220, 164],
          [274, 42], [130, 56], [-14, 30], [-158, 58],
        ];
        gsap.utils.toArray(".maze-app-chip").forEach((chip, index) => {
          const origin = mazeChipOrigins[index];
          mazeTimeline.fromTo(
            chip,
            { x: origin[0], y: origin[1], scale: 0.54, opacity: 0 },
            { x: 0, y: 0, scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" },
            1.062 + index * 0.055,
          );
        });

        mazeTimeline.fromTo(
          "#maze-tiny-label",
          { x: 90, scale: 0.88, opacity: 0 },
          { x: 0, scale: 1, opacity: 1, duration: 0.46, ease: "power3.out" },
          1.22,
        );

        gsap.utils.toArray(".maze-dof-context").forEach((layer) => {
          const depth = Number(layer.dataset.depth) || 1;
          mazeTimeline.to(
            layer,
            {
              "--dof": `${3.2 * depth}px`,
              opacity: depth === 1 ? 0.72 : 0.52,
              duration: 0.56,
              ease: "power2.inOut",
            },
            1.62,
          );
        });

        // Scene 3 — a wrong-tap prompt arrives with a deterministic echo streak.
        mazeTimeline.fromTo(
          "#maze-install-card",
          { x: 430, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.38, ease: "power4.out" },
          2.302,
        );

        gsap.utils.toArray(".maze-install-ghost").forEach((ghost) => {
          const echo = Number(ghost.dataset.echo);
          mazeTimeline.fromTo(
            ghost,
            { x: 430 + echo * 34, opacity: 0.52 / echo },
            { x: 0, opacity: 0, duration: 0.38, ease: "power4.out" },
            2.302,
          );
        });

        // Blueprint signature: phone content fades, the container reshapes, and the person is revealed beneath.
        mazeTimeline.to(
          "#maze-screen-old",
          { opacity: 0, duration: 0.26, ease: "power1.in" },
          2.82,
        );
        mazeTimeline.to(
          "#maze-install-stack",
          { opacity: 0, duration: 0.22, ease: "power1.in" },
          2.82,
        );
        mazeTimeline.to(
          "#maze-phone-shell",
          {
            scaleX: 0.72,
            scaleY: 0.79,
            borderRadius: 260,
            backgroundColor: "rgba(30, 43, 250, 0.08)",
            duration: 0.68,
            ease: "power3.inOut",
          },
          2.82,
        );
        mazeTimeline.fromTo(
          "#maze-avatar-layer",
          { scale: 0.88, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.48, ease: "power2.out" },
          3.04,
        );
        mazeTimeline.to(
          "#maze-title",
          { y: -34, opacity: 0, duration: 0.26, ease: "power2.in" },
          3.24,
        );
        mazeTimeline.to(
          "#maze-accent-rule",
          { opacity: 0, duration: 0.22, ease: "power1.in" },
          3.26,
        );
        mazeTimeline.to(
          "#maze-tiny-label",
          { opacity: 0, duration: 0.22, ease: "power1.in" },
          3.3,
        );

        // Scene 4 — the word resolves behind the fixed person; demands close in from every side.
        mazeTimeline.fromTo(
          "#maze-word",
          { scale: 1.22, opacity: 0 },
          { scale: 1, opacity: 0.15, duration: 0.52, ease: "expo.out" },
          3.63,
        );

        gsap.utils.toArray(".maze-demand").forEach((bubble, index) => {
          mazeTimeline.fromTo(
            bubble,
            {
              x: Number(bubble.dataset.fromX),
              y: Number(bubble.dataset.fromY),
              scale: 0.42,
              opacity: 0,
            },
            {
              x: 0,
              y: 0,
              scale: 1,
              opacity: 1,
              duration: 0.62,
              ease: "power3.out",
            },
            3.63 + index * 0.065,
          );
        });

        window.__timelines["01-the-maze"] = mazeTimeline;
      </script>
    </template>
  </body>
</html>
