                  <div class="maze-install-title">Install a free game?</div>
                  <div class="maze-install-actions">
                    <div class="maze-install-action">Cancel</div>
                    <div class="maze-install-action">Install</div>
                  </div>
                </div>
              </div>

              <div class="maze-speaker"></div>
            </div>
            <div class="maze-tiny-note" id="maze-tiny-note">Tiny buttons</div>
          </div>

          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-1" data-from-x="-360" data-from-y="-230">Update now</div>
          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-2" data-from-x="0" data-from-y="-360">9 alerts</div>
          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-3" data-from-x="360" data-from-y="-220">Free game?</div>
          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-4" data-from-x="430" data-from-y="0">Allow access?</div>
          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-5" data-from-x="360" data-from-y="260">Sign in</div>
          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-6" data-from-x="0" data-from-y="340">Install?</div>
          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-7" data-from-x="-360" data-from-y="260">Buy now</div>
          <div data-layout-allow-overflow data-layout-allow-occlusion class="maze-demand" id="maze-demand-8" data-from-x="-430" data-from-y="0">Try this?</div>

          <div class="maze-progress"></div>
        </section>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const mazeTimeline = gsap.timeline({ paused: true });

        // Scene 1: the phone and three recognizable surfaces assemble immediately.
        mazeTimeline.fromTo(
          "#maze-phone-wrap",
          { scale: 0.94, y: 42, opacity: 0 },
          { scale: 1, y: 0, opacity: 1, duration: 0.46, ease: "power3.out" },
          0.04,
        );

        const mazeHeadlineWords = gsap.utils.toArray(".maze-headline-word");
        const mazeHeadlineOnsets = [];
        let mazeHeadlineCursor = 0.04;
        mazeHeadlineWords.forEach((word) => {
          mazeHeadlineOnsets.push(mazeHeadlineCursor);
          const characterWindow = Math.max(0.085, word.textContent.trim().length * 0.018);
          mazeHeadlineCursor += characterWindow + 0.028;
        });
        mazeHeadlineWords.forEach((word, index) => {
          mazeTimeline.fromTo(
            word,
            { y: 72, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.38, ease: "power4.out" },
            mazeHeadlineOnsets[index],
          );
        });

        mazeTimeline.fromTo(
          "#maze-headline-rule",
          { scaleX: 0, opacity: 0 },
          { scaleX: 1, opacity: 1, duration: 0.42, ease: "power3.out" },
          0.26,
        );

        gsap.utils.toArray(".maze-panel").forEach((panel, index) => {
          mazeTimeline.fromTo(
            panel,
            { scale: 0.9, y: 28, opacity: 0 },
            { scale: 1, y: 0, opacity: 1, duration: 0.42, ease: "power3.out" },
            0.28 + index * 0.12,
          );
        });

        // The call glyph has finite internal SVG motion, then returns to its exact resting state.
        const mazeCallDot = document.getElementById("maze-call-dot");
        const mazeCallRingA = document.getElementById("maze-call-ring-a");
        const mazeCallRingB = document.getElementById("maze-call-ring-b");
        const mazeCallPulse = { p: 0 };
        mazeTimeline.to(
          mazeCallPulse,
          {
            p: Math.PI * 4,
            duration: 1.68,
            ease: "none",
            onUpdate: () => {
              const wave = Math.sin(mazeCallPulse.p);
              const scale = 1 + wave * 0.1;
              mazeCallDot.setAttribute("transform", `translate(88 20) scale(${scale}) translate(-88 -20)`);
              mazeCallDot.setAttribute("opacity", String(0.78 + wave * 0.16));
              mazeCallRingA.setAttribute("stroke-dashoffset", String(-mazeCallPulse.p * 3.82));
              mazeCallRingB.setAttribute("opacity", String(0.44 + wave * 0.12));
            },
          },
          0.54,
        );

        // Scene 2: tiles expand from one shared center into deterministic short-path slots.
        const mazeChipCenterOffsets = [
          [254, 58],
          [102, 58],
          [-50, 58],
          [-202, 58],
          [226, -82],
          [74, -82],
          [-78, -82],
          [-230, -82],
        ];
        gsap.utils.toArray(".maze-app-chip").forEach((chip, index) => {
          const offset = mazeChipCenterOffsets[index];
          mazeTimeline.fromTo(
            chip,
            { x: offset[0], y: offset[1], scale: 0.56, opacity: 0 },
            { x: 0, y: 0, scale: 1, opacity: 1, duration: 0.46, ease: "power3.out" },
            1.1 + index * 0.052,
          );
        });

        mazeTimeline.fromTo(
          "#maze-tiny-note",
          { x: 90, scale: 0.88, opacity: 0 },
          { x: 0, scale: 1, opacity: 1, duration: 0.44, ease: "power3.out" },
          1.24,
        );

        gsap.utils.toArray(".maze-dof").forEach((layer) => {
          const depth = Number(layer.dataset.depth) || 1;
          mazeTimeline.to(
            layer,
            {
              "--dof": `${depth * 3}px`,
              opacity: depth === 1 ? 0.72 : 0.5,
              duration: 0.44,
              ease: "power2.inOut",
            },
            1.7,
          );
        });

        // One bounded, low-amplitude jitter pass heightens pressure and settles before the prompt.
        const mazeChipField = document.getElementById("maze-chip-field");
        const mazeJitter = { p: 0 };
        mazeTimeline.to(
          mazeJitter,
          {
            p: Math.PI * 2,
            duration: 0.62,
            ease: "none",
            onUpdate: () => {
              const progress = mazeJitter.p / (Math.PI * 2);
              const envelope = progress < 0.72 ? 1 : (1 - progress) / 0.28;
              const x = Math.sin(mazeJitter.p * 3) * 1.6 * envelope;
              const y = Math.sin(mazeJitter.p * 2) * 1.2 * envelope;
              mazeChipField.style.transform = `translate3d(${x}px, ${y}px, 0)`;
            },
          },
          1.64,
        );

        // Scene 3: the generic prompt streaks in and snaps sharp.
        mazeTimeline.fromTo(
          "#maze-install-card",
          { x: 440, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.36, ease: "power4.out" },
          2.3,
        );

        gsap.utils.toArray(".maze-install-ghost").forEach((ghost) => {
          const echo = Number(ghost.dataset.echo);
          mazeTimeline.fromTo(
            ghost,
            { x: 440 + echo * 34, opacity: 0.5 / echo },
            { x: 0, opacity: 0, duration: 0.36, ease: "power4.out" },
            2.3,
          );
        });

        // The phone is the visual anchor: old content fades early, the shell reshapes,
        // and the person beneath appears during the late part of the same morph.
        mazeTimeline.to(
          "#maze-screen-old",
          { opacity: 0, duration: 0.28, ease: "power1.in" },
          3.02,
        );
        mazeTimeline.to(
          "#maze-phone-shell",
          {
            scaleX: 0.73,
            scaleY: 0.84,
            borderRadius: 230,
            backgroundColor: "rgba(30, 43, 250, 0.08)",
            duration: 0.66,
            ease: "power3.inOut",
          },
          3.02,
        );
        mazeTimeline.fromTo(
          "#maze-person-layer",
          { scale: 0.9, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.4, ease: "power2.out" },
          3.28,
        );
        mazeTimeline.to(
          "#maze-headline",
          { y: -30, opacity: 0, duration: 0.3, ease: "power2.in" },
          3.12,
        );
        mazeTimeline.to(
          "#maze-headline-rule",
          { opacity: 0, duration: 0.22, ease: "power1.in" },
          3.16,
        );
        mazeTimeline.to(
          "#maze-tiny-note",
          { opacity: 0, duration: 0.22, ease: "power1.in" },
          3.2,
        );
        mazeTimeline.to(
          "#maze-install-stack",
          { opacity: 0, duration: 0.22, ease: "power1.in" },
          3.66,
        );

        // Scene 4: demands close in from every compass direction while the person stays fixed.
        mazeTimeline.fromTo(
          "#maze-word",
          { scale: 1.18, opacity: 0 },
          { scale: 1, opacity: 0.14, duration: 0.44, ease: "expo.out" },
          3.7,
        );

        gsap.utils.toArray(".maze-demand").forEach((bubble, index) => {
          mazeTimeline.fromTo(
            bubble,
            {
              x: Number(bubble.dataset.fromX),
              y: Number(bubble.dataset.fromY),
              scale: 0,
              opacity: 0,
            },
            {
              x: 0,
              y: 0,
              scale: 1,
              opacity: 1,
              duration: 0.54,
              ease: "power3.out",
            },
            3.7 + index * 0.045,
          );
        });

        window.__timelines["01-the-maze"] = mazeTimeline;
      </script>
    </template>
  </body>
</html>
